name: Action - Build

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version-postfix:
        type: string
        default: ""
      web-path-root:
        type: string
        default: "/"
    outputs:
      version:
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.args.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Typst
        run: |
          wget -nv https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz
          tar xvf typst-x86_64-unknown-linux-musl.tar.xz 
          mv typst-x86_64-unknown-linux-musl/typst typst
          pwd
          ls -lha
          ./typst --version
      - name: Install Shiroa
        run: |
          wget -nv https://github.com/Myriad-Dreamin/shiroa/releases/download/v0.3.1-rc4/shiroa-x86_64-unknown-linux-musl.tar.gz
          tar xvzf shiroa-x86_64-unknown-linux-musl.tar.gz
          mv shiroa-x86_64-unknown-linux-musl/shiroa shiroa
          pwd
          ls -lha
          ./shiroa --version
      - name: Download fonts
        run: |
          wget -nv https://github.com/7sDream/fonts-and-layout-zhCN/releases/download/extra-fonts%2F20240615/extra.tgz
          mkdir -p fonts/extra
          tar xvzf extra.tgz -C fonts/extra
          tree fonts
      - name: Make input arguments
        id: args
        run: |
          hash=$(echo "${{ github.sha }}" | cut -c 1-7)
          datetime=$(env TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M")
          echo "version=$hash${{ inputs.version-postfix }}" >> "$GITHUB_OUTPUT"
          echo "datetime=$datetime" >> "$GITHUB_OUTPUT"
      - name: Build web book
        continue-on-error: true
        run: |
          ./shiroa build --font-path fonts --path-to-root "${{ inputs.web-path-root }}"
      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: dist
          if-no-files-found: error
      - name: Build
        run: |
          declare -a themes=("light" "rust" "coal" "navy" "ayu")
          for theme in "${themes[@]}"; do
            ./typst compile \
              --font-path fonts
              --input "githash=${{ steps.args.outputs.version }}" \
              --input "compile_time=${{ steps.args.outputs.datetime }}" \
              --input "theme=${theme}" \
              pdf.typ book-${{ steps.args.outputs.version }}-${theme}.pdf
          done
      - name: Upload pdf artifact
        uses: actions/upload-artifact@v7
        with:
          name: pdf
          path: book-*.pdf
